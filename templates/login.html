<html>
    <head><title>Login</title></head>
    <body style="            background:black;
            color:white;
            font-family:system-ui;

            display:flex;
            justify-content:center;
            align-items:center;">
    <div style="
display:flex;
flex-direction:column;
gap:20px;
">
        <h1>Welcome</h1>
        {% with msg = get_flashed_messages()%}
        {% if msg %}
        <p style="color: #07e91ef1;">{{msg[-1]}}</p>
        {% endif %}
        {% endwith %}
        <form method="POST" action="/logindata" style="  display:flex;
            flex-direction: column; gap:15px;
            width:280;">
            Enter Your UserName:<input type="text" name="user" placeholder="Name"><br>
            Enter Your Password:<input type="password" name="pass" placeholder="password"><br>
            <button type="submit">login</button>
        </form>
    </div>

    <style>
          input{

            background:#111;
            border:1px solid #333;

            padding:15px;
            border-radius:12px;

            color:white;
            font-size:15px;
        }
          button{

            padding:15px;

            border:none;
            border-radius:12px;

            background:white;
            color:black;

            font-size:15px;
            
          }

    </style>
    </body>
</html>
